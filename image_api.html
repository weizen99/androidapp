<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>圖片管理系統 2.1 終極旗艦版</title>
    <!-- 1. 核心資源 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root {
            --accent-blue: #00d2ff;
            --glass: rgba(20, 20, 20, 0.9);
        }

        body {
            background: #050505;
            color: #fff;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        }

        /* 圖片展演舞台 (固定頂端) */
        .image-stage {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 15px 0;
            border-bottom: 2px solid var(--accent-blue);
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .viewer-box {
            position: relative;
            max-height: 80%;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,210,255,0.2);
        }

        #mainImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: 0.3s transform ease;
        }

        /* 縮圖卡片樣式 */
        .img-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

            .img-card:hover {
                transform: scale(1.03);
            }

        .active-card {
            border: 2px solid var(--accent-blue) !important;
            background: #222 !important;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        .thumb-wrapper {
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .thumb-wrapper img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0.7;
                transition: 0.3s;
            }

        .img-card:hover .thumb-wrapper img, .active-card .thumb-wrapper img {
            opacity: 1;
        }

        /* 右鍵選單 */
        #contextMenu {
            display: none;
            position: absolute;
            z-index: 2000;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            width: 150px;
        }

            #contextMenu div {
                padding: 10px 15px;
                cursor: pointer;
                color: #eee;
                font-size: 14px;
                border-bottom: 1px solid #333;
            }

                #contextMenu div:hover {
                    background: var(--accent-blue);
                    color: #000;
                }

        /* UI 工具 */
        .search-bar {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 30px;
        }

            .search-bar:focus {
                background: rgba(255,255,255,0.2);
                color: white;
                border-color: var(--accent-blue);
                box-shadow: none;
            }

        .btn-action {
            background: none;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            transition: 0.3s;
        }

            .btn-action:hover {
                border-color: var(--accent-blue);
                color: var(--accent-blue);
            }

        input[type=range] {
            width: 100px;
            accent-color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <!-- 1. 展演舞台 -->
    <div class="image-stage">
        <div class="viewer-box">
            <img id="mainImage" src="https://via.placeholder.com/800x450/000000/00d2ff?text=Gallery+Ready" alt="Viewer">
        </div>

        <div id="imageTitle" class="mt-2 fw-bold text-info text-truncate" style="max-width:80%">請選擇照片開始播放</div>

        <div class="stage-controls">
            <button class="btn-action" onclick="rotateImage()"><i class="bi bi-arrow-clockwise"></i></button>

            <div class="d-flex align-items-center bg-dark rounded-pill px-3 py-1 border border-secondary">
                <button class="btn btn-primary btn-sm rounded-pill px-3 me-2" onclick="playSlideshow()" id="btnPlay">播放</button>
                <span class="small me-2">間隔: <span id="secVal">3</span>s</span>
                <input type="range" id="intervalRange" min="1" max="15" value="3" oninput="$('#secVal').text(this.value)">
            </div>

            <button class="btn-action" onclick="downloadImage()"><i class="bi bi-download"></i></button>
        </div>

        <div class="mt-3 d-flex gap-2 w-75 justify-content-center">
            <select id="yearFilter" class="form-select search-bar w-25" onchange="loadData()">
                <option value="ALL">全部年份</option>
            </select>
            <input type="text" id="fuzzySearch" class="form-control search-bar w-50" placeholder="搜尋圖片名稱...">
        </div>
    </div>

    <!-- 2. 右鍵選單 -->
    <div id="contextMenu">
        <div onclick="setAsPoster()"><i class="bi bi-image-fill me-2"></i>設為封面</div>
        <div onclick="askDelete()" class="text-danger"><i class="bi bi-trash-fill me-2"></i>刪除照片</div>
    </div>

    <!-- 3. 圖片庫 -->
    <div class="container mt-5 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">素材清單 <span id="imgCount" class="badge bg-info ms-2">0</span></h3>
            <button class="btn btn-outline-light btn-sm rounded-pill" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> 重新整理</button>
        </div>
        <div id="imageGrid" class="row g-4"></div>
    </div>

    <script>
        const API_URL = "https://zen2965.duckdns.org:8888/showimage/image_api.aspx";
        let allImages = [];
        let slideshowInterval = null;
        let currentIdx = 0;
        let rotation = 0;
        let rightClickedItem = null;

        $(document).ready(function () {
            loadYears();
            loadData();
            $(document).on("click", () => $("#contextMenu").hide());

            // 即時模糊搜尋
            $("#fuzzySearch").on("input", function () {
                let key = $(this).val();
                if (!key) { renderGrid(allImages); return; }
                const fuse = new Fuse(allImages, { keys: ['姓名', '內容'], threshold: 0.3 });
                renderGrid(fuse.search(key).map(r => r.item));
            });
        });

        // 1. 年份載入
        function loadYears() {
            $.ajax({
                type: "POST", url: API_URL + "/GetYears",
                contentType: "application/json; charset=utf-8",
                success: function (res) {
                    res.d.forEach(y => $("#yearFilter").append(`<option value="${y}">${y} 年</option>`));
                }
            });
        }

        // 2. 資料載入
        function loadData() {
            $.ajax({
                type: "POST", url: API_URL + "/GetData",
                data: JSON.stringify({
                    searchKey: "", sortBy: "識別碼", sortDir: "DESC", pageIndex: 1, pageSize: 5000,
                    filterYear: $("#yearFilter").val()
                }),
                contentType: "application/json; charset=utf-8",
                success: function (res) {
                    allImages = res.d.data;
                    renderGrid(allImages);
                    $("#imgCount").text(allImages.length);
                }
            });
        }

        // 3. 渲染網格
        function renderGrid(list) {
            let h = list.map((item, idx) => {
                let finalSrc = getSrc(item.內容, item.郵件);
                return `
                        <div class="col-6 col-md-4 col-lg-2">
                            <div class="img-card" id="card-${idx}"
                                 onclick="handleInsertPlay(${idx}, '${finalSrc}', '${item.姓名}')"
                                 oncontextmenu="handleRightClick(event, ${idx})">
                                <div class="thumb-wrapper">
                                    <img src="${finalSrc}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=Error'">
                                </div>
                                <div class="p-2 text-center small text-truncate fw-bold">${item.姓名}</div>
                            </div>
                        </div>
                    `;
            }).join('');
            $("#imageGrid").html(h || '<div class="text-center w-100 text-muted py-5">無相關照片</div>');
            highlightCard(); // 初始高亮
        }

        // 4. 插播與幻燈片邏輯
        function handleInsertPlay(idx, src, title) {
            currentIdx = idx; // 更新播放指針
            viewImage(src, title);
        }

        function playSlideshow() {
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
                $("#btnPlay").text("播放").removeClass("btn-danger").addClass("btn-primary");
            } else {
                $("#btnPlay").text("停止").removeClass("btn-primary").addClass("btn-danger");
                startInterval();
            }
        }

        function startInterval() {
            const sec = parseInt($("#intervalRange").val()) * 1000;
            slideshowInterval = setInterval(() => {
                if (allImages.length === 0) return;
                currentIdx++;
                if (currentIdx >= allImages.length) currentIdx = 0;
                let item = allImages[currentIdx];
                viewImage(getSrc(item.內容, item.郵件), item.姓名);
            }, sec);
        }

        $("#intervalRange").on("change", function () {
            if (slideshowInterval) { clearInterval(slideshowInterval); startInterval(); }
        });

        // 5. 顯示大圖 (修正版：不跳動、增加高亮)
        function viewImage(src, title) {
            rotation = 0;
            $("#mainImage").css("transform", "rotate(0deg)").attr("src", src);
            $("#imageTitle").text(title);
            highlightCard();
        }

        function highlightCard() {
            $(".img-card").removeClass("active-card");
            $(`#card-${currentIdx}`).addClass("active-card");
        }

        // 6. 右鍵選單與管理
        function handleRightClick(e, idx) {
            e.preventDefault();
            rightClickedItem = allImages[idx];
            $("#contextMenu").css({ top: e.pageY + "px", left: e.pageX + "px" }).fadeIn(100);
        }

        function setAsPoster() {
            Swal.fire("成功", `已將 ${rightClickedItem.姓名} 設為封面`, "success");
        }

        function askDelete() {
            Swal.fire({
                title: '確認刪除', text: `確定要刪除 ${rightClickedItem.姓名}？`,
                input: 'password', inputPlaceholder: '密碼: 1234', showCancelButton: true
            }).then(res => {
                if (res.isConfirmed) {
                    $.ajax({
                        type: "POST", url: API_URL + "/DeleteData",
                        data: JSON.stringify({ id: rightClickedItem.識別碼, pwd: res.value }),
                        contentType: "application/json; charset=utf-8",
                        success: function (r) {
                            if (r.d.success) { Swal.fire("已刪除", "", "success"); loadData(); }
                            else { Swal.fire("錯誤", r.d.msg, "error"); }
                        }
                    });
                }
            });
        }

        // 7. 工具函數
        function rotateImage() {
            rotation += 90;
            $("#mainImage").css("transform", `rotate(${rotation}deg)`);
        }

        function downloadImage() {
            let src = $("#mainImage").attr("src");
            if (src.includes('placeholder')) return;
            const link = document.createElement('a');
            link.href = src;
            link.download = 'Photo_' + new Date().getTime() + '.jpg';
            link.click();
        }

        function getSrc(path, type) {
            if (!path) return "";
            if (path.toLowerCase().startsWith('http')) return path;
            try {
                let cleanPath = decodeURIComponent(path).replace(/\\/g, '/');
                let fileName = cleanPath.split('/').pop();
                return "https://zen2965.duckdns.org:8888/showimage/image/" + encodeURI(fileName);
            } catch (e) { return ""; }
        }
    </script>
</body>
</html>
