<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Excel SQL 系統 (HTML版)</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: '標楷體';
            padding: 20px;
        }

        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        .nav-link {
            color: #0026ff;
        }

        .status-msg {
            color: red;
            font-weight: bold;
        }

        #GridView1 img {
            width: 80px;
            border-radius: 4px;
        }

        .sql-box {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px;
        }


        /* 自訂圖片樣式 */
        .data-img {
            max-width: 400px; /* 你可以根據需求調整成 400px 或 500px */
            height: auto;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            cursor: zoom-in;
            transition: all 0.3s ease;
        }

            /* 滑鼠移上去時的效果 */
            .data-img:hover {
                max-width: 600px; /* 移上去時再變大一點 */
                box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
                z-index: 999;
                position: relative;
            }

        /* 讓表格欄位寬度自動適應圖片 */
        #resultTable td {
            vertical-align: middle;
        }



    </style>
</head>
<body>

    <!-- 導航列 -->
    <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link active" href="#">Excel SQL(本頁)</a></li>
        <li class="nav-item"><a class="nav-link" href="http://220.135.3.78:8888/stockquery/incomeedit1">自選股編輯</a></li>
        <li class="nav-item"><a class="nav-link" href="http://220.135.3.78:8888/mymvc/trend3.aspx">顯示圖表</a></li>
    </ul>

    <div class="mt-3">
        <p class="text-primary">請先選取 Excel 檔案 (*.xlsx)，然後再上傳。</p>

        <div class="form-inline">
            <!--<input type="file" id="fileUpload" class="form-control-file mr-2">
            <label>工作表：</label>
            <select id="selectWorksheet" class="form-control mr-2">
                <option value="0">第 1 張</option>
                <option value="1">第 2 張</option>
            </select>
            <button id="btnUpload" class="btn btn-dark">顯示上傳的 Excel</button>-->
        </div>

        <div class="mt-3 form-inline">
            <label class="text-danger">密碼：</label>
            <input type="password" id="txtPwd" class="form-control mx-2" style="width:200px;" value="2157">
            <button id="btnQuery" class="btn btn-danger mr-2">顯示結果在下方表格</button>
            <!--<button id="btnDownload" class="btn btn-danger">SQL 查詢並下載 Excel</button>-->
        </div>

        <div class="mt-3 sql-box">
            <label>選擇資料庫：</label>
            <select id="useDatabase" class="form-control d-inline-block" style="width:180px" ;">
                <option value="stockchangedate">stockchangedate</option>
                <option value="favor2">favor2 (含圖片)</option>
                <option value="stockchange">stockchange</option>
                <option value="stockprice">stockprice</option>
                <option value="stockinfo">stockinfo</option>
                <option value="work">work</option>
                <option value="stockchangefour">stockchangefour</option>
                <option value="fromaccessdatabase">fromaccessdatabase</option>
                <option value="pokopoko">pokopoko</option>
                <option value="wordvoice">wordvoice</option>
                <option value="favor1">favor1</option>
                <option value="favor3">favor3</option>
            </select>
            <label class="ml-2">最新日期：</label>
            <input type="text" id="txtDate" class="form-control d-inline-block" style="width:120px;">
        </div>

        <div class="mt-3">
            <label>SQL 指令："SELEC "自動加不用寫</label>
            <textarea id="sqlText" class="form-control" rows="8">top 30 * FROM chips5 order by 日期 desc,漲幅 desc</textarea>
        </div>
    </div>

    <div id="msg" class="status-msg mt-2"></div>

    <!-- 結果表格 -->
    <div class="table-container">
        <table id="resultTable" class="table table-bordered table-sm">
            <thead class="thead-dark"><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
   
    <script>
        $(document).ready(function () {
            $("#btnQuery").click(function () {
                const sql = $("#sqlText").val();
                const db = $("#useDatabase").val();
                const pwd = $("#txtPwd").val();

                // 初始化狀態
                $("#msg").removeClass("error").addClass("loading").text("資料讀取中，請稍候...");
                $("#tableHead, #tableBody").empty();

                $.ajax({
                    type: "POST",
                    url: "https://zen2965.duckdns.org:8888/DataService.aspx/ExecuteSQL",
                    data: JSON.stringify({ sql: sql, db: db, pwd: pwd }),
                    contentType: "application/json; charset=utf-8",
                    dataType: "json",

                    success: function (res) {
                        try {
                            const data = JSON.parse(res.d);

                            if (data && data.length > 0) {
                                // 1. 產生動態表頭
                                let keys = Object.keys(data[0]);
                                keys.forEach(k => $("#tableHead").append(`<th>${k}</th>`));

                                // 2. 逐行產生內容
                                data.forEach(row => {
                                    let tr = $("<tr></tr>");
                                    keys.forEach(k => {
                                        let val = row[k] === null ? "" : row[k];

                                        // 判斷是否為圖片欄位 (photo)
                                        if (k.toLowerCase() === 'photo' && val !== "") {
                                            let cleanVal = String(val).trim();
                                            let imgSrc = "";

                                            // 檢查後端是否忘記轉碼
                                            if (cleanVal === "System.Byte[]") {
                                                tr.append(`<td class="text-danger">後端未轉碼</td>`);
                                                return;
                                            }

                                            // 圖片路徑判斷
                                            if (cleanVal.startsWith("~/")) {
                                                imgSrc = cleanVal.replace("~/", "/");
                                            }
                                            else if (cleanVal.startsWith("data:") || cleanVal.startsWith("http")) {
                                                imgSrc = cleanVal;
                                            }
                                            else if (cleanVal.startsWith("/9j/")) {
                                                // 針對 JPEG 特徵碼補上標頭
                                                imgSrc = "data:image/jpeg;base64," + cleanVal;
                                            }
                                            else {
                                                // 其他情況統一視為 Base64
                                                imgSrc = "data:image/jpeg;base64," + cleanVal;
                                            }

                                            // 插入圖片，套用 .data-img 樣式
                                            tr.append(`<td>
                                                <img src="${imgSrc}" class="data-img"
                                                     title="點擊查看大圖"
                                                     onclick="window.open(this.src)"
                                                     onerror="this.parentElement.innerHTML='<span class=\'text-muted\'>格式不支援</span>';">
                                            </td>`);
                                        } else {
                                            // 一般文字欄位
                                            tr.append(`<td>${val}</td>`);
                                        }
                                    });
                                    $("#tableBody").append(tr);
                                });
                                $("#msg").removeClass("loading").text("查詢完成，共 " + data.length + " 筆資料。");
                            } else {
                                $("#msg").removeClass("loading").text("查無資料。");
                            }
                        } catch (err) {
                            $("#msg").removeClass("loading").addClass("error").text("解析錯誤：" + err.message);
                            console.error("解析失敗內容：", res.d);
                        }
                    },
                    error: function (e) {
                        $("#msg").removeClass("loading").addClass("error").text("連線失敗：" + e.statusText);
                        console.error("Error Detail:", e.responseText);
                    }
                });
            });
        });
    </script>
</body>
</html>
