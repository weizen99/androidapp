<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>地圖座標同步系統 - 進階標記版</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', "Microsoft JhengHei";
            padding: 20px;
            background: #f4f7f6;
        }

        .map-box {
            height: 450px;
            width: 80%;
            border-radius: 12px;
            border: 2px solid #ddd;
            margin-bottom: 20px;
            background: #eee;
        }

        .coord-group {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: #0056b3;
            }


        /* 自訂標記跳動動畫 */
        @keyframes custom-bounce {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .marker-bounce {
            animation: custom-bounce 0.5s infinite alternate;
        }



    </style>
</head>
<body>
    <form id="form1" runat="server">
        <div class="coord-group">
            <div>
                目標緯度: <input type="text" id="txtlat" value="25.0339" size="10" />
                目標經度: <input type="text" id="txtlng" value="121.5644" size="10" />
                <button type="button" onclick="loadMap()">📍 座標位置地圖</button>
            </div>
            <br />
            <div style="color: #666;">
                我的目前位置: <input type="text" id="txtlat1" readonly size="10" />
                <input type="text" id="txtlng1" readonly size="10" />
                <button type="button" style="background: #28a745;" onclick="mychange()">⬅️ 套用</button>
                <button type="button" style="background: #6f42c1;" onclick="mychange1()">🔗 同步跳轉</button>
            </div>
        </div>

        <div id="map" class="map-box"></div>
        <div id="map1" class="map-box"></div>

        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

        <script>
            let map, userMarker, lastManualMarker = null;
            let AdvancedMarkerElement, PinElement; // 新版標記變數
            const googleKey = "AIzaSyBjls_Lx6XQpblHvYK4zy_l1yXrwOtUFOA";

            function loadGoogleMaps() {
                if (window.google && window.google.maps) {
                    initMap();
                    return;
                }
                const script = document.createElement('script');
                // 【修正】：將 loading=async 改為單純參數，並確保 callback 在最後
                script.src = `https://maps.googleapis.com/maps/api/js?key=${googleKey}&callback=initMap&v=weekly`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);
            }

            // 改為 async 函數以支援最新標記庫
            async function initMap() {
                try {
                    const initialPos = { lat: 25.0339, lng: 121.5644 };

                    // 1. 載入標記庫
                    const markerLib = await google.maps.importLibrary("marker");
                    const { AdvancedMarkerElement, PinElement } = markerLib;

                    // 2. 初始化地圖
                    map = new google.maps.Map(document.getElementById('map'), {
                        zoom: 16,
                        center: initialPos,
                        mapId: "DEMO_MAP_ID",
                        gestureHandling: 'greedy'
                    });

                    // 3. 只有在地圖成功建立後，才建立標記
                    const userPin = new PinElement({
                        background: "#4285F4",
                        borderColor: "white",
                        glyphColor: "white",
                        scale: 0.8
                    });

                    userMarker = new AdvancedMarkerElement({
                        map: map,
                        position: initialPos,
                        content: userPin,
                        title: "我的位置"
                    });

                    // 點擊事件
                    map.addListener('click', (e) => { updateMarker(e.latLng); });

                    // GPS 追蹤
                    if (navigator.geolocation) {
                        navigator.geolocation.watchPosition((p) => {
                            const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
                            document.getElementById('txtlat1').value = pos.lat.toFixed(6);
                            document.getElementById('txtlng1').value = pos.lng.toFixed(6);
                            if (userMarker) userMarker.position = pos;
                        }, null, { enableHighAccuracy: true });
                    }

                    initLeaflet();
                } catch (err) {
                    console.error("地圖初始化中斷，通常是金鑰或權限問題。");
                }
            }

            function updateMarker(latLng) {
                // 1. 移除舊標記
                if (lastManualMarker) lastManualMarker.map = null;

                document.getElementById('txtlat').value = latLng.lat().toFixed(6);
                document.getElementById('txtlng').value = latLng.lng().toFixed(6);

                // 2. 建立新版標記
                const pin = new google.maps.marker.PinElement({
                    background: "#EA4335",
                    borderColor: "white",
                    glyphColor: "white",
                });

                // 3. 【關鍵】把跳動的 CSS 類別加到標記元件上
                pin.element.classList.add("marker-bounce");

                lastManualMarker = new google.maps.marker.AdvancedMarkerElement({
                    map: map,
                    position: latLng,
                    content: pin.element, // 使用帶有動畫的 element
                    title: "選取位置"
                });

                map.panTo(latLng);
            }

            function loadMap() {
                const lat = parseFloat(document.getElementById('txtlat').value);
                const lng = parseFloat(document.getElementById('txtlng').value);
                updateMarker({ lat: lat, lng: lng });
            }

            function mychange() {
                document.getElementById('txtlat').value = document.getElementById('txtlat1').value;
                document.getElementById('txtlng').value = document.getElementById('txtlng1').value;
                loadMap();
            }

            function mychange1() {
                const x = document.getElementById('txtlat').value;
                const y = document.getElementById('txtlng').value;
                location.href = "map.aspx?x=" + x + "&y=" + y;
            }

            function initLeaflet() {
                const map1 = L.map('map1').setView([25.0339, 121.5644], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map1);
                let marker = L.marker([25.0339, 121.5644], { draggable: true }).addTo(map1);
                map1.on('click', (e) => {
                    marker.setLatLng(e.latlng);
                    document.getElementById('txtlat').value = e.latlng.lat.toFixed(6);
                    document.getElementById('txtlng').value = e.latlng.lng.toFixed(6);
                });
            }

            window.onload = loadGoogleMaps;
        </script>
    </form>
</body>
</html>
