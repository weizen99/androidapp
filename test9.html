<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>

<body>
    <textarea id="edit"></textarea>
    <button id="save">儲存</button>
    <script>
        window.payload = '';
        (function bundle() {
            function base64_decode(base64) {
                return decodeURIComponent(atob(base64));
            }
            function getApp(payload) {
                return base64_decode('JTNDIURPQ1RZUEUlMjBodG1sJTNFJTBBJTNDaHRtbCUyMGxhbmclM0QlMjJ6aC1IYW50LVRXJTIyJTNFJTBBJTNDaGVhZCUzRSUwQSUyMCUyMCUyMCUyMCUzQ21ldGElMjBjaGFyc2V0JTNEJTIyVVRGLTglMjIlM0UlMEElMjAlMjAlMjAlMjAlM0NtZXRhJTIwaHR0cC1lcXVpdiUzRCUyMlgtVUEtQ29tcGF0aWJsZSUyMiUyMGNvbnRlbnQlM0QlMjJJRSUzRGVkZ2UlMjIlM0UlMEElMjAlMjAlMjAlMjAlM0NtZXRhJTIwbmFtZSUzRCUyMnZpZXdwb3J0JTIyJTIwY29udGVudCUzRCUyMndpZHRoJTNEZGV2aWNlLXdpZHRoJTJDJTIwaW5pdGlhbC1zY2FsZSUzRDEuMCUyMiUzRSUwQSUyMCUyMCUyMCUyMCUzQ3RpdGxlJTNFJUU4JUE4JTk4JUU0JUJBJThCJUU2JTlDJUFDJTNDJTJGdGl0bGUlM0UlMEElM0MlMkZoZWFkJTNFJTBBJTNDYm9keSUzRSUwQSUyMCUyMCUyMCUyMCUzQ3RleHRhcmVhJTIwaWQlM0QlMjJlZGl0JTIyJTNFJTNDJTJGdGV4dGFyZWElM0UlMEElMjAlMjAlMjAlMjAlM0NidXR0b24lMjBpZCUzRCUyMnNhdmUlMjIlM0UlRTUlODQlQjIlRTUlQUQlOTglM0MlMkZidXR0b24lM0UlMEElMjAlMjAlMjAlMjA=') +
                    '<script>' +
                    'window.payload = ' + JSON.stringify(payload) + ';' +
                    '(' + bundle.toString() + ')();' +
                    '<\/script>' +
                    base64_decode('JTBBJTNDJTJGYm9keSUzRSUwQSUzQyUyRmh0bWwlM0UlMEE=');
            }
            document.querySelector('#edit').value = window.payload;
            document.querySelector('#save').addEventListener('click', () => {
                let val = document.querySelector('#edit').value;
                let html = getApp(val);
                let aTag = document.createElement('a');
                let url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
                aTag.download = 'notepad.html';
                aTag.href = url;
                aTag.click();
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 100);
            })
        })();
    </script>
</body>

</html>
