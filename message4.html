<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業留言系統 - GitHub 遠端版</title>
    <!-- CSS 載入 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        }

        .main-card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: white;
            padding: 25px;
            margin-top: 30px;
        }

        .sort-header {
            cursor: pointer;
            transition: 0.2s;
        }

            .sort-header:hover {
                color: #0d6efd;
                background-color: #f8f9fa;
            }

        /* 針對內容欄位的專業設定 */
        .content-cell {
            min-width: 300px; /* 設定最小寬度，防止縮得太小 */
            word-break: break-all; /* 遇到長英文或網址強制斷行 */
            white-space: normal; /* 允許正常換行 */
            line-height: 1.6; /* 增加行高，閱讀更舒適 */
        }

        /* 讓 ID 和日期等固定資料不會換行 */
        .nowrap-cell {
            white-space: nowrap;
        }

        /* 增加表格容器的陰影與圓角 */
        .main-card {
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            padding: 25px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
  
    <div class="container">
        <div class="main-card">
            <!-- 頂部區 -->
            <div class="row align-items-center mb-4">
                <div class="col-md-6"><h3 class="fw-bold m-0 text-primary"><i class="bi bi-cloud-check"></i> 留言管理系統</h3></div>
                <div class="col-md-6 text-end">
                    <div class="input-group">
                        <input type="text" id="inputSearch" class="form-control" placeholder="關鍵字搜尋...">
                        <button class="btn btn-primary" onclick="doSearch()">搜尋</button>
                        <button class="btn btn-success" type="button" onclick="openAddModal()">新增留言</button>
                    </div>
                </div>
            </div>

            <!-- 資料表格 -->
            <div class="table-responsive">
                <table class="table table-hover align-middle border">
                    <thead class="table-dark">
                        <tr>
                            <th onclick="setSort('識別碼')" class="sort-header">ID ⇅</th>
                            <th onclick="setSort('姓名')" class="sort-header">姓名 ⇅</th>
                            <th onclick="setSort('郵件')" class="sort-header">郵件 ⇅</th>
                            <th onclick="setSort('內容')" class="sort-header">內容 ⇅</th>
                            <th onclick="setSort('日期')" class="sort-header">日期 ⇅</th>
                            <th class="text-center">功能</th>
                        </tr>
                    </thead>
                    <!--<tbody id="dataTableBody">-->
                    <tbody id="dataTableBody">
                        <!--<tr><td colspan="6" class="text-center py-5">正在連線至遠端伺服器...</td></tr>-->
                    </tbody>
                </table>
            </div>

            <!-- 分頁區 -->
            <div class="row align-items-center mt-4">
                <div class="col-md-4 d-flex align-items-center gap-2">
                    <select id="pageSizeSelect" class="form-select form-select-sm" style="width: 80px;" onchange="changePageSize()">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                    </select>
                    <span class="small text-muted">筆 / 頁</span>
                </div>
                <div class="col-md-4 text-center"><div id="infoLabel" class="small fw-bold text-muted"></div></div>
                <div class="col-md-4"><nav><ul class="pagination pagination-sm justify-content-end mb-0" id="pagerList"></ul></nav></div>
            </div>
        </div>
    </div>

    <!-- [Modal] 新增 -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">新增資料</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">姓名</label><input type="text" id="addName" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="addMail" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">留言內容</label><textarea id="addContent" class="form-control" rows="4"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="submitAdd()">確認送出</button>
                </div>
            </div>
        </div>
    </div>

    <!-- [Modal] 編輯 -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">修改留言內容</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="form-label">姓名</label><input type="text" id="editName" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="editMail" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">內容</label><textarea id="editContent" class="form-control" rows="4"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitUpdate()">儲存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 【重要】填入您 ASP.NET 伺服器的完整位址
        const SERVER_URL = "https://zen2965.duckdns.org:8888/excelimport/message4.aspx";

        var config = { searchKey: "", sortBy: "識別碼", sortDir: "DESC", pageIndex: 1, pageSize: 10 };
        var addModal, editModal;

        $(document).ready(function () {
            // 手動初始化 Modal 物件，防止彈不出來
            addModal = new bootstrap.Modal(document.getElementById('addModal'));
            editModal = new bootstrap.Modal(document.getElementById('editModal'));
            loadGrid();
        });

        // 統一呼叫 API 函數
        function callAPI(method, data, successCallback) {
            $.ajax({
                type: "POST",
                url: SERVER_URL + "/" + method,
                data: JSON.stringify(data),
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                crossDomain: true,
                success: function (res) { successCallback(res.d); },
                error: function (xhr) {
                    Swal.fire("API 連線失敗", "請確認後端 ASP.NET 是否開啟 CORS 且伺服器正在執行。", "error");
                }
            });
        }

        function loadGrid() {
            callAPI("GetData", config, function (r) {
                if (r.error) { Swal.fire("SQL 錯誤", r.error, "error"); return; }
                renderTable(r.data);
                renderPager(r.totalCount);
            });
        }


        function renderTable(list) {
            var html = "";
            if (!list || list.length === 0) {
                html = "<tr><td colspan='6' class='text-center py-5 text-muted'>查無資料</td></tr>";
            } else {
                list.forEach(function (row) {
                    html += `<tr>
                        <td class="nowrap-cell"><span class="badge bg-secondary">${row.識別碼}</span></td>
                        <td class="fw-bold text-primary nowrap-cell">${row.姓名}</td>
                        <td class="small">${row.郵件}</td>

                        <!-- 修改這裡：移除 text-truncate，改用 content-cell -->
                        <td class="content-cell">${row.內容}</td>

                        <td class="text-muted small nowrap-cell">${row.日期}</td>
                        <td class="text-center nowrap-cell">
                            <button class="btn btn-sm btn-outline-primary" onclick="openEditModal(${row.識別碼},'${row.姓名}','${row.郵件}','${row.內容}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="askDelete(${row.識別碼})"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
                });
            }
            $("#dataTableBody").html(html);
        }

        // --- 功能函數 ---
        function openAddModal() { addModal.show(); }
        function submitAdd() {
            var d = { name: $("#addName").val(), mail: $("#addMail").val(), content: $("#addContent").val() };
            callAPI("InsertData", d, function (r) {
                if (r.success) { Swal.fire("成功", "已新增", "success").then(() => { addModal.hide(); loadGrid(); }); }
            });
        }

        function openEditModal(id, name, mail, content) {
            $("#editId").val(id); $("#editName").val(name); $("#editMail").val(mail); $("#editContent").val(content);
            editModal.show();
        }
        function submitUpdate() {
            var d = { id: $("#editId").val(), name: $("#editName").val(), mail: $("#editMail").val(), content: $("#editContent").val() };
            callAPI("UpdateData", d, function (r) {
                if (r.success) { Swal.fire("成功", "已修改", "success").then(() => { editModal.hide(); loadGrid(); }); }
            });
        }

        function askDelete(id) {
            Swal.fire({ title: '確認刪除？', input: 'password', showCancelButton: true }).then(res => {
                if (res.isConfirmed) {
                    callAPI("DeleteData", { id: id, pwd: res.value }, function (r) {
                        if (r.success) { Swal.fire("已刪除", "", "success").then(loadGrid); }
                        else { Swal.fire("錯誤", r.msg, "error"); }
                    });
                }
            });
        }

        // 分頁與排序邏輯 (略，與前版相同)
        function changePageSize() { config.pageSize = parseInt($("#pageSizeSelect").val()); config.pageIndex = 1; loadGrid(); }
        function setSort(col) { config.sortBy = col; config.sortDir = (config.sortDir === "DESC" ? "ASC" : "DESC"); loadGrid(); }
        function changePage(p) { event.preventDefault(); config.pageIndex = p; loadGrid(); }
        function doSearch() { config.searchKey = $("#inputSearch").val(); config.pageIndex = 1; loadGrid(); }
        function renderPager(total) {
            var totalPages = Math.ceil(total / config.pageSize);
            $("#infoLabel").text(`第 ${config.pageIndex} / ${totalPages || 1} 頁`);
            var h = "";
            for (var i = 1; i <= totalPages; i++) {
                var active = (i === config.pageIndex) ? "active" : "";
                h += `<li class="page-item ${active}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
            }
            $("#pagerList").html(h);
        }
    </script>
   
</body>
</html>
