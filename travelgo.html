<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程明細報告</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: sans-serif;
        }

        .timeline-line {
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #30363d;
        }

        .timeline-dot {
            position: absolute;
            left: 13px;
            width: 16px;
            height: 16px;
            background: #58a6ff;
            border-radius: 50%;
            border: 4px solid #0d1117;
        }

        .day-header {
            background: linear-gradient(90deg, #1f6feb 0%, transparent 100%);
            padding: 10px 15px;
            border-radius: 8px;
            margin: 30px 0 15px 0;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">

        <div class="flex justify-between mb-8">
            <button onclick="window.close()" class="text-gray-500 hover:text-white transition"><i class="fas fa-times mr-1"></i>關閉分頁</button>
            <div class="text-[10px] text-gray-700 font-mono">Powered by Zen AI System</div>
        </div>

        <div id="loading-box" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin fa-3x text-blue-500"></i>
            <p class="mt-4 text-gray-500">正在連線資料庫並讀取行程...</p>
        </div>

        <div id="main-content" class="hidden">
            <div class="text-center mb-12">
                <h1 id="res-title" class="text-3xl font-bold text-white mb-3"></h1>
                <p id="res-summary" class="text-gray-400 italic text-sm px-6 leading-relaxed"></p>
            </div>

            <div id="timeline-container" class="relative">
                <!-- 由 JS 動態產生 -->
            </div>
        </div>
    </div>

    <!-- 這裡放您原本申請的地圖 Key，這樣明細頁也有導航功能 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBjls_Lx6XQpblHvYK4zy_l1yXrwOtUFOA"></script>

    <script>
        $(document).ready(function () {
            const planId = new URLSearchParams(window.location.search).get('id');
            if (!planId) {
                $("#loading-box").html("<div class='text-orange-500'>❌ 錯誤：網址中找不到行程編號</div>");
                return;
            }

            $.ajax({
                type: "POST",
                url: "travelgo.aspx/GetFullReport",
                //url: "https://zen2965.duckdns.org:8888/showimage/ItineraryResult.aspx/GetFullReport",
                data: JSON.stringify({ planId: parseInt(planId) }),
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {
                    if (res.d.success) {
                        renderUI(res.d.data);
                    } else {
                        $("#loading-box").html(`<div class='text-red-500'>❌ 資料庫讀取失敗<br><small>${res.d.msg}</small></div>`);
                    }
                },
                error: function (xhr) {
                    $("#loading-box").html(`<div class='text-red-500'>❌ 伺服器 500 錯誤<br><small>請確認 ItineraryResult.aspx.vb 已發佈到伺服器</small></div>`);
                }
            });
        });

        function renderUI(data) {
            $("#loading-box").hide();
            $("#main-content").removeClass("hidden");
            $("#res-title").text(data.title);
            $("#res-summary").text(data.summary);

            let html = "";
            let currentDay = 0;

            data.details.forEach(item => {
                if (item.day !== currentDay) {
                    currentDay = item.day;
                    html += `<div class="day-header"><i class="fas fa-calendar-day mr-2"></i> 第 ${currentDay} 天 行程</div>`;
                }
                html += `
                        <div class="relative pl-12 pb-8">
                            <div class="timeline-line"></div>
                            <div class="timeline-dot mt-1"></div>
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl shadow-2xl hover:border-blue-900 transition">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-blue-400 font-bold text-lg">${item.location}</h3>
                                    <span class="text-[10px] font-mono text-gray-500 bg-gray-800 px-2 py-1 rounded">${item.time}</span>
                                </div>
                                <p class="text-sm text-gray-400 leading-relaxed mb-4">${item.desc}</p>
                                <div class="pt-3 border-t border-gray-800">
                                    <a href="https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lng}"
                                       target="_blank" class="text-xs text-blue-500 hover:text-blue-300 flex items-center gap-1">
                                       <i class="fas fa-location-arrow"></i> 開啟 Google 導航
                                    </a>
                                </div>
                            </div>
                        </div>`;
            });
            $("#timeline-container").html(html);
        }

    </script>
</body>
</html>
